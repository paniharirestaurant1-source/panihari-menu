<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANIHARI ORDERS | Kitchen Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --red: #e63946; --green: #10b981; --orange: #f59e0b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; min-height: 100vh; }
        h1, h2, h3, .font-luxury { font-family: 'Cinzel', serif; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1rem;
            padding: 1.25rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-card:hover { border-color: rgba(212,175,55,0.3); transform: translateY(-2px); }

        .order-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1.25rem;
            padding: 1.25rem;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .order-card.status-new { border-left: 4px solid var(--red); }
        .order-card.status-preparing { border-left: 4px solid var(--orange); }
        .order-card.status-done { border-left: 4px solid var(--green); opacity: 0.6; }
        .order-card.status-done .done-overlay {
            position: absolute; inset: 0; background: rgba(16,185,129,0.05);
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }
        .order-card.removing {
            animation: slideOut 0.5s ease forwards;
        }
        @keyframes slideOut {
            0% { opacity: 1; transform: translateX(0) scale(1); }
            100% { opacity: 0; transform: translateX(80px) scale(0.9); height: 0; padding: 0; margin: 0; border: 0; overflow: hidden; }
        }
        @keyframes slideIn {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .order-card.entering { animation: slideIn 0.4s ease forwards; }

        .btn-complete {
            background: rgba(16,185,129,0.1);
            color: var(--green);
            border: 1px solid rgba(16,185,129,0.3);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }
        .btn-complete:hover { background: var(--green); color: #000; }
        .btn-complete:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-preparing {
            background: rgba(245,158,11,0.1);
            color: var(--orange);
            border: 1px solid rgba(245,158,11,0.3);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }
        .btn-preparing:hover { background: var(--orange); color: #000; }
        .btn-preparing:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-clear {
            background: linear-gradient(135deg, var(--gold), #b8941e);
            color: #000;
            padding: 0.75rem 2rem;
            border-radius: 1rem;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            border: none;
            transition: all 0.25s ease;
        }
        .btn-clear:hover { box-shadow: 0 0 25px rgba(212,175,55,0.4); transform: translateY(-2px); }
        .btn-clear:active { transform: scale(0.97); }
        .btn-clear:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .btn-delete {
            background: rgba(230,57,70,0.1);
            color: var(--red);
            border: 1px solid rgba(230,57,70,0.3);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }
        .btn-delete:hover { background: var(--red); color: #fff; }

        .badge-new { background: var(--red); color: #fff; padding: 0.2rem 0.75rem; border-radius: 999px; font-size: 0.65rem; font-weight: 800; letter-spacing: 0.15em; }
        .badge-preparing { background: var(--orange); color: #000; padding: 0.2rem 0.75rem; border-radius: 999px; font-size: 0.65rem; font-weight: 800; letter-spacing: 0.15em; }
        .badge-done { background: var(--green); color: #fff; padding: 0.2rem 0.75rem; border-radius: 999px; font-size: 0.65rem; font-weight: 800; letter-spacing: 0.15em; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #111; border: 1px solid rgba(212,175,55,0.3);
            color: var(--gold); padding: 0.75rem 1.5rem; border-radius: 1rem;
            font-size: 0.85rem; font-weight: 600; z-index: 999;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(-50%) translateY(20px); } }

        .empty-state { text-align: center; padding: 4rem 2rem; color: rgba(255,255,255,0.15); }
        .empty-state i { font-size: 4rem; margin-bottom: 1rem; }

        .sound-toggle {
            position: fixed; top: 1rem; right: 1rem; z-index: 50;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--gold); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease; font-size: 1rem;
        }
        .sound-toggle:hover { background: rgba(212,175,55,0.1); border-color: var(--gold); }
    </style>
</head>
<body>

    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()" title="Sound On/Off">
        <i class="fas fa-volume-high"></i>
    </button>

    <div class="max-w-6xl mx-auto px-4 py-6">

        <!-- HEADER -->
        <header class="flex flex-col md:flex-row items-center justify-between gap-4 mb-8">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <i class="fas fa-leaf text-emerald-500 text-xl"></i>
                    <h1 class="font-luxury text-2xl md:text-3xl tracking-wider" style="color: var(--gold);">PANIHARI ORDERS</h1>
                </div>
                <p class="text-xs tracking-[0.3em] text-white/30 uppercase">Real-time Kitchen Dashboard</p>
            </div>
            <div class="flex items-center gap-3">
                <button class="btn-clear" id="clearDoneBtn" onclick="clearDoneOrders()" disabled>
                    <i class="fas fa-trash-can mr-2"></i>CLEAR DONE
                </button>
                <button class="btn-delete" onclick="clearAllOrders()" title="Sab Orders Delete Karo">
                    <i class="fas fa-bomb mr-1"></i> CLEAR ALL
                </button>
            </div>
        </header>

        <!-- STATS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
            <div class="stat-card">
                <p class="text-3xl font-bold" style="color: var(--red);" id="statNew">0</p>
                <p class="text-[10px] tracking-[0.2em] text-white/40 mt-1 uppercase">Pending</p>
            </div>
            <div class="stat-card">
                <p class="text-3xl font-bold" style="color: var(--orange);" id="statPreparing">0</p>
                <p class="text-[10px] tracking-[0.2em] text-white/40 mt-1 uppercase">Preparing</p>
            </div>
            <div class="stat-card">
                <p class="text-3xl font-bold" style="color: var(--green);" id="statDone">0</p>
                <p class="text-[10px] tracking-[0.2em] text-white/40 mt-1 uppercase">Completed</p>
            </div>
            <div class="stat-card">
                <p class="text-3xl font-bold" style="color: var(--gold);" id="statRevenue">₹0</p>
                <p class="text-[10px] tracking-[0.2em] text-white/40 mt-1 uppercase">Today Revenue</p>
            </div>
        </div>

        <!-- FILTER TABS -->
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
            <button onclick="setFilter('all')" data-filter="all" class="filter-btn px-5 py-2 rounded-xl text-sm font-semibold tracking-wider transition-all" style="background: var(--gold); color: #000;">ALL</button>
            <button onclick="setFilter('new')" data-filter="new" class="filter-btn px-5 py-2 rounded-xl text-sm font-semibold tracking-wider transition-all" style="background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5);">NEW</button>
            <button onclick="setFilter('preparing')" data-filter="preparing" class="filter-btn px-5 py-2 rounded-xl text-sm font-semibold tracking-wider transition-all" style="background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5);">PREPARING</button>
            <button onclick="setFilter('done')" data-filter="done" class="filter-btn px-5 py-2 rounded-xl text-sm font-semibold tracking-wider transition-all" style="background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5);">DONE</button>
        </div>

        <!-- ORDERS LIST -->
        <div id="ordersList" class="space-y-3 pb-20"></div>

    </div>

    <script>
    // ===== FIREBASE CONFIG (MENU WALA SAME) =====
    const firebaseConfig = {
        apiKey: "AIzaSyCjzN9CJOhCMff2CLpbLvUl66gf1a81Gw8",
        authDomain: "panihari-orders.firebaseapp.com",
        databaseURL: "https://panihari-orders-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "panihari-orders",
        storageBucket: "panihari-orders.firebasestorage.app",
        messagingSenderId: "886118460552",
        appId: "1:886118460552:web:6c45c8b757d54ea484433d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ===== STATE =====
    let allOrders = {};
    let currentFilter = 'all';
    let soundEnabled = true;
    let knownOrderIds = new Set();

    // ===== SOUND BEEP =====
    function playBeep() {
        if (!soundEnabled) return;
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 880; osc.type = 'sine';
            gain.gain.value = 0.3;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
            osc.stop(ctx.currentTime + 0.5);
            // Dobara beep thoda der me
            setTimeout(() => {
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.connect(gain2); gain2.connect(ctx.destination);
                osc2.frequency.value = 1100; osc2.type = 'sine';
                gain2.gain.value = 0.3;
                osc2.start();
                gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
                osc2.stop(ctx.currentTime + 0.4);
            }, 200);
        } catch(e) {}
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        const icon = document.querySelector('#soundToggle i');
        icon.className = soundEnabled ? 'fas fa-volume-high' : 'fas fa-volume-xmark';
        showToast(soundEnabled ? 'Sound ON' : 'Sound OFF');
    }

    // ===== TIME FORMAT =====
    function formatTime(isoString) {
        if (!isoString) return '--';
        try {
            const d = new Date(isoString);
            return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true }) +
                   ' · ' + d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
        } catch(e) { return isoString; }
    }

    // ===== FILTER =====
    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.dataset.filter === f) {
                btn.style.background = 'var(--gold)';
                btn.style.color = '#000';
            } else {
                btn.style.background = 'rgba(255,255,255,0.05)';
                btn.style.color = 'rgba(255,255,255,0.5)';
            }
        });
        renderOrders();
    }

    // ===== TOAST =====
    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = '<i class="fas fa-check-circle mr-2"></i>' + msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    // ===== UPDATE STATS =====
    function updateStats() {
        let newCount = 0, prepCount = 0, doneCount = 0, revenue = 0;
        const today = new Date().toDateString();
        Object.values(allOrders).forEach(order => {
            if (order.status === 'new') newCount++;
            else if (order.status === 'preparing') prepCount++;
            else if (order.status === 'done') doneCount++;
            // Aaj ki revenue sirf done orders se
            if (order.status === 'done') {
                try {
                    const orderDate = new Date(order.time).toDateString();
                    if (orderDate === today) revenue += (order.total || 0);
                } catch(e) {}
            }
        });
        document.getElementById('statNew').textContent = newCount;
        document.getElementById('statPreparing').textContent = prepCount;
        document.getElementById('statDone').textContent = doneCount;
        document.getElementById('statRevenue').textContent = '₹' + revenue;

        // Clear Done button enable/disable
        document.getElementById('clearDoneBtn').disabled = doneCount === 0;

        // Browser title me pending count
        document.title = newCount > 0 ? `(${newCount}) PANIHARI ORDERS` : 'PANIHARI ORDERS';
    }

    // ===== RENDER ORDERS =====
    function renderOrders() {
        const container = document.getElementById('ordersList');
        let orders = Object.entries(allOrders);

        // Filter
        if (currentFilter !== 'all') {
            orders = orders.filter(([id, o]) => o.status === currentFilter);
        }

        // Sort: new first (newest), then preparing, then done (oldest first)
        orders.sort((a, b) => {
            const statusOrder = { 'new': 0, 'preparing': 1, 'done': 2 };
            const sa = statusOrder[a[1].status] ?? 3;
            const sb = statusOrder[b[1].status] ?? 3;
            if (sa !== sb) return sa - sb;
            // Same status me newest first (except done me oldest first)
            const ta = new Date(a[1].time || 0).getTime();
            const tb = new Date(b[1].time || 0).getTime();
            return sa === 2 ? ta - tb : tb - ta;
        });

        if (orders.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-utensils"></i>
                    <p class="text-lg font-semibold">there is no one</p>
                    <p class="text-sm mt-2 opacity-50">New orders will automatically appear here.</p>
                </div>`;
            return;
        }

        container.innerHTML = orders.map(([id, order]) => {
            const statusClass = 'status-' + (order.status || 'new');
            const isDone = order.status === 'done';
            const isNew = order.status === 'new';
            const isPreparing = order.status === 'preparing';
            const items = order.items || [];

            const badgeHtml = isNew ? '<span class="badge-new">NEW</span>'
                : isPreparing ? '<span class="badge-preparing">PREPARING</span>'
                : '<span class="badge-done">DONE</span>';

            const itemsHtml = items.map(item =>
                `<div class="flex justify-between items-center py-1.5 border-b border-white/5 last:border-0">
                    <span class="text-sm text-white/80">${item.name || 'Item'}</span>
                    <span class="text-sm text-white/50">×${item.qty || 1}</span>
                    <span class="text-sm font-semibold" style="color: var(--gold);">₹${item.sub || (item.price * item.qty) || 0}</span>
                </div>`
            ).join('');

            return `
            <div class="order-card ${statusClass} entering" id="order-${id}">
                ${isDone ? '<div class="done-overlay"><i class="fas fa-check-circle text-5xl text-emerald-500/20"></i></div>' : ''}
                <div class="flex flex-col md:flex-row md:items-start justify-between gap-3">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-3 flex-wrap">
                            ${badgeHtml}
                            <span class="text-white/30 text-xs"><i class="fas fa-clock mr-1"></i>${formatTime(order.time)}</span>
                        </div>
                        <div class="flex items-center gap-3 mb-3">
                            <span class="px-3 py-1 rounded-lg text-sm font-bold tracking-wider" style="background: linear-gradient(135deg, var(--gold), #b8941e); color: #000;">
                                TABLE ${order.table || '?'}
                            </span>
                        </div>
                        <div class="space-y-0 mb-3">${itemsHtml}</div>
                        <div class="flex items-center gap-4 text-xs text-white/30">
                            ${order.subtotal ? `<span>Subtotal: ₹${order.subtotal}</span>` : ''}
                            ${order.gst ? `<span>GST: ₹${order.gst}</span>` : ''}
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-3 md:min-w-[160px]">
                        <div class="text-right">
                            <p class="text-[10px] text-white/30 uppercase tracking-widest">Total</p>
                            <p class="text-2xl font-bold" style="color: var(--gold);">₹${order.total || 0}</p>
                        </div>
                        <div class="flex flex-col gap-2 w-full">
                            ${isNew ? `<button class="btn-preparing w-full" onclick="markPreparing('${id}')"><i class="fas fa-fire-burner mr-1"></i> START</button>` : ''}
                            ${!isDone ? `<button class="btn-complete w-full" onclick="markDone('${id}')"><i class="fas fa-check mr-1"></i> COMPLETE</button>` : ''}
                            <button class="btn-delete w-full" onclick="deleteSingleOrder('${id}')"><i class="fas fa-trash mr-1"></i> DELETE</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // ===== MARK PREPARING =====
    function markPreparing(orderId) {
        if (!orderId) return;
        db.ref('orders/' + orderId + '/status').set('preparing').then(() => {
            showToast('Order Preparing Me Gayi!');
        }).catch(err => {
            alert('Error: ' + err.message);
        });
    }

    // ===== MARK DONE =====
    function markDone(orderId) {
        if (!orderId) return;
        db.ref('orders/' + orderId + '/status').set('done').then(() => {
            showToast('Order Complete!');
        }).catch(err => {
            alert('Error: ' + err.message);
        });
    }

    // ===== DELETE SINGLE ORDER =====
    function deleteSingleOrder(orderId) {
        if (!orderId) return;
        if (!confirm('Yeh order delete karna hai?')) return;
        // Animation
        const el = document.getElementById('order-' + orderId);
        if (el) el.classList.add('removing');

        setTimeout(() => {
            db.ref('orders/' + orderId).remove().then(() => {
                showToast('Order Deleted!');
            }).catch(err => {
                alert('Error: ' + err.message);
            });
        }, 500);
    }

    // ===== CLEAR DONE ORDERS (MAIN FIX) =====
    function clearDoneOrders() {
        const doneOrders = Object.entries(allOrders).filter(([id, o]) => o.status === 'done');
        if (doneOrders.length === 0) {
            showToast('Koi Done Order Nahi Hai');
            return;
        }

        if (!confirm(`${doneOrders.length} done orders clear karna hai?`)) return;

        // Pehle animation lagao
        doneOrders.forEach(([id]) => {
            const el = document.getElementById('order-' + id);
            if (el) el.classList.add('removing');
        });

        // Phir Firebase se delete karo - EK EK KARKE
        setTimeout(() => {
            let deleteCount = 0;
            let totalDone = doneOrders.length;

            doneOrders.forEach(([id]) => {
                db.ref('orders/' + id).remove()
                    .then(() => {
                        deleteCount++;
                        if (deleteCount === totalDone) {
                            showToast(`${totalDone} Orders Cleared!`);
                        }
                    })
                    .catch(err => {
                        console.error('Delete error for ' + id, err);
                        deleteCount++;
                    });
            });
        }, 500);
    }

    // ===== CLEAR ALL ORDERS =====
    function clearAllOrders() {
        const allIds = Object.keys(allOrders);
        if (allIds.length === 0) {
            showToast('Koi Order Nahi Hai');
            return;
        }
        if (!confirm(`SAARE ${allIds.length} orders delete karna hai? Ye irreversible hai!`)) return;

        // Animation sab pe
        allIds.forEach(id => {
            const el = document.getElementById('order-' + id);
            if (el) el.classList.add('removing');
        });

        setTimeout(() => {
            let count = 0;
            let total = allIds.length;
            allIds.forEach(id => {
                db.ref('orders/' + id).remove()
                    .then(() => {
                        count++;
                        if (count === total) showToast('Sab Orders Cleared!');
                    })
                    .catch(err => {
                        console.error(err);
                        count++;
                    });
            });
        }, 500);
    }

    // ===== FIREBASE REAL-TIME LISTENER =====
    db.ref('orders').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const prevCount = Object.keys(allOrders).length;
        allOrders = data;

        // Naya order aaya hai? (pehle se nahi tha aur status new hai)
        Object.entries(data).forEach(([id, order]) => {
            if (!knownOrderIds.has(id) && order.status === 'new') {
                playBeep();
            }
            knownOrderIds.add(id);
        });

        // Purane orders jo delete ho gaye unko known set se hatado
        knownOrderIds.forEach(id => {
            if (!data[id]) knownOrderIds.delete(id);
        });

        updateStats();
        renderOrders();
    });

    // ===== WAITER CALLS LISTENER =====
    db.ref('waiter_calls').on('child_added', (snapshot) => {
        const call = snapshot.val();
        if (call && call.table) {
            playBeep();
            showToast(`Waiter Called - TABLE ${call.table}`);
            // Auto delete after 10 sec
            setTimeout(() => {
                snapshot.ref.remove().catch(() => {});
            }, 10000);
        }
    });

    // ===== BILL REQUESTS LISTENER =====
    db.ref('bill_requests').on('child_added', (snapshot) => {
        const req = snapshot.val();
        if (req && req.table) {
            playBeep();
            showToast(`Bill Request - TABLE ${req.table}`);
            setTimeout(() => {
                snapshot.ref.remove().catch(() => {});
            }, 10000);
        }
    });

    </script>
</body>
</html>
